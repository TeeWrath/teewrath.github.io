<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — Subroto Banerjee</title>

    <link rel="shortcut icon" href="./assets/images/newpic.png" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/elite.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0d0b08" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
      })();
    </script>

    <style>
      .reader-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: var(--accent); z-index: 60; transition: width 0.1s linear; }
      .proj-wrap { max-width: 860px; margin: 0 auto; padding: 84px 20px 120px; }
      .proj-back {
        font-family: var(--ff-mono); font-size: 13px; color: var(--text-low);
        display: inline-flex; align-items: center; gap: 8px; margin-bottom: 34px; transition: var(--transition-1);
      }
      .proj-back:hover { color: var(--accent); gap: 12px; }

      .proj-hero { display: grid; gap: 22px; margin-bottom: 16px; }
      .proj-cover {
        width: 100%; height: clamp(200px, 42vw, 380px); object-fit: cover;
        border-radius: 20px; border: 1px solid var(--hairline); box-shadow: var(--shadow-3);
      }
      .proj-cat {
        font-family: var(--ff-mono); text-transform: uppercase; letter-spacing: 0.14em;
        font-size: 11px; color: var(--accent); margin-bottom: 12px;
      }
      .proj-title {
        font-family: var(--ff-display); font-weight: 700; letter-spacing: -0.03em;
        font-size: clamp(30px, 6vw, 48px); line-height: 1.05; color: var(--text-hi); margin-bottom: 16px;
      }
      .proj-tagline { font-size: 17px; line-height: 1.7; color: var(--text-mid); max-width: 680px; }

      .proj-actions { display: flex; flex-wrap: wrap; gap: 12px; margin: 26px 0 8px; }
      .proj-btn {
        font-family: var(--ff-mono); font-size: 13px; letter-spacing: 0.02em;
        display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 12px;
        border: 1px solid var(--hairline); background: var(--surface-2); color: var(--text-mid);
        cursor: pointer; transition: var(--transition-1);
      }
      .proj-btn ion-icon { font-size: 17px; }
      .proj-btn:hover { color: var(--text-hi); border-color: var(--accent); transform: translateY(-2px); }
      .proj-btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
      .proj-btn.primary:hover { box-shadow: var(--shadow-2); }

      .proj-tech { display: flex; flex-wrap: wrap; gap: 9px; margin: 24px 0 6px; }
      .proj-tech .tech-chip { cursor: default; }

      .proj-hr { height: 1px; background: var(--hairline); border: 0; margin: 34px 0; }

      .proj-body { color: var(--text-mid); font-size: 16.5px; line-height: 1.8; }
      .proj-body > * + * { margin-top: 20px; }
      .proj-body h1, .proj-body h2, .proj-body h3 { font-family: var(--ff-display); color: var(--text-hi); letter-spacing: -0.02em; margin-top: 38px; line-height: 1.25; }
      .proj-body h2 { font-size: 23px; }
      .proj-body h3 { font-size: 19px; }
      .proj-body a { color: var(--accent); border-bottom: 1px solid var(--accent-dim); }
      .proj-body strong { color: var(--text-hi); }
      .proj-body ul, .proj-body ol { padding-left: 22px; }
      .proj-body li { margin-top: 7px; } .proj-body li::marker { color: var(--accent); }
      .proj-body blockquote { border-left: 2px solid var(--accent); padding-left: 20px; color: var(--text-hi); font-style: italic; }
      .proj-body img { max-width: 100%; border-radius: 14px; border: 1px solid var(--hairline); }
      .proj-body code { font-family: var(--ff-mono); font-size: 14px; background: var(--panel-2); border: 1px solid var(--hairline); padding: 2px 6px; border-radius: 6px; color: var(--text-hi); }
      .proj-body pre { background: var(--ink-900); border: 1px solid var(--hairline); border-radius: 14px; padding: 18px 20px; overflow-x: auto; }
      .proj-body pre code { background: none; border: 0; padding: 0; }

      .proj-share {
        display: inline-flex; align-items: center; gap: 7px; font-family: var(--ff-mono); font-size: 12px; color: var(--text-mid);
        padding: 8px 14px; border-radius: 10px; border: 1px solid var(--hairline); background: var(--surface-2); cursor: pointer; transition: var(--transition-1);
      }
      .proj-share:hover { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }

      .proj-footer { margin-top: 48px; padding-top: 26px; border-top: 1px solid var(--hairline); display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between; }
      .proj-footer a { font-family: var(--ff-mono); font-size: 13px; color: var(--accent); display: inline-flex; align-items: center; gap: 8px; }

      .proj-comments { margin-top: 50px; padding-top: 30px; border-top: 1px solid var(--hairline); }
      .proj-comments-title { font-family: var(--ff-mono); text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px; color: var(--text-low); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
      .proj-comments-title::after { content: ""; flex: 1; height: 1px; background: var(--hairline); }
      .comments-placeholder { font-family: var(--ff-mono); font-size: 12.5px; line-height: 1.7; color: var(--text-low); background: var(--surface-2); border: 1px dashed var(--hairline-strong); border-radius: 12px; padding: 18px 20px; }
      .comments-placeholder code { color: var(--accent); }
      .proj-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(10px); z-index: 200; font-family: var(--ff-mono); font-size: 12px; padding: 10px 16px; border-radius: 10px; background: var(--accent); color: var(--accent-ink); opacity: 0; transition: .25s; pointer-events: none; }
      .proj-state { font-family: var(--ff-mono); color: var(--text-low); }
    </style>
  </head>

  <body>
    <div class="bg-canvas" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="reader-progress" data-progress></div>

    <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light theme" title="Toggle theme">
      <ion-icon class="icon-moon" name="moon-outline"></ion-icon>
      <ion-icon class="icon-sun" name="sunny-outline"></ion-icon>
    </button>

    <main class="proj-wrap">
      <a class="proj-back" href="./index.html#projects">&#8592; All projects</a>
      <div data-project><p class="proj-state">Loading…</p></div>
    </main>

    <!-- GISCUS config is shared with the blog; edit it in post.html or here -->
    <script>
      window.GISCUS = {
        repo: "TeeWrath/teewrath.github.io",
        repoId: "R_kgDOMJhweA",
        category: "Announcements",
        categoryId: "DIC_kwDOMJhweM4C-v9X"
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./assets/js/project.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  </body>
</html>
