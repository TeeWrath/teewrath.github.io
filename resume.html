<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résumé — Subroto Banerjee</title>

    <link rel="shortcut icon" href="./assets/images/newpic.png" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/elite.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0d0b08" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
      })();
    </script>

    <style>
      .resume-page-wrap { max-width: 860px; margin: 0 auto; padding: 84px 18px 90px; }
      .resume-page-bar {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px;
      }
      .resume-page-bar .rb-title {
        font-family: var(--ff-mono); text-transform: uppercase; letter-spacing: 0.14em;
        font-size: 11px; color: var(--text-low); margin-right: auto;
        display: inline-flex; align-items: center; gap: 10px;
      }
      .resume-page-bar a.rb-back { color: var(--text-low); }
      .resume-page-bar a.rb-back:hover { color: var(--accent); }
      .resume-sheet {
        background: var(--surface); border: 1px solid var(--hairline);
        border-radius: 18px; box-shadow: var(--shadow-5); overflow: hidden;
      }
      @media print {
        .theme-toggle, .resume-page-bar, .bg-canvas, .bg-grid, .cursor-glow { display: none !important; }
        .resume-page-wrap { padding: 0; max-width: none; }
        .resume-sheet { border: 0; box-shadow: none; border-radius: 0; }
        body, .resume-doc { background: #fff !important; color: #111 !important; }
      }
    </style>
  </head>

  <body>
    <div class="bg-canvas" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light theme" title="Toggle theme">
      <ion-icon class="icon-moon" name="moon-outline"></ion-icon>
      <ion-icon class="icon-sun" name="sunny-outline"></ion-icon>
    </button>

    <main class="resume-page-wrap">
      <div class="resume-page-bar">
        <span class="rb-title">
          <a class="rb-back" href="./index.html">&#8592; Back</a> · Résumé
        </span>
        <button class="rb-btn primary" data-resume-pdf type="button">
          <ion-icon name="download-outline"></ion-icon> Download PDF
        </button>
        <button class="rb-btn" data-resume-share type="button">
          <ion-icon name="share-social-outline"></ion-icon> Share
        </button>
        <button class="rb-btn" data-resume-print type="button">
          <ion-icon name="print-outline"></ion-icon> Print
        </button>
      </div>

      <div class="resume-sheet">
        <div class="resume-doc" data-resume-page>
          <div class="rd-inner"><p>Loading résumé…</p></div>
        </div>
      </div>
    </main>

    <script>
      (function () {
        const root = document.documentElement;
        const btn = document.querySelector('[data-theme-toggle]');
        if (btn) btn.addEventListener('click', () => {
          const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
          root.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
        });
        const glow = document.querySelector('.cursor-glow');
        if (glow && matchMedia('(pointer: fine)').matches && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
          let x = innerWidth / 2, y = innerHeight / 2, cx = x, cy = y, on = false;
          addEventListener('mousemove', (e) => { x = e.clientX; y = e.clientY; if (!on) { glow.style.opacity = '1'; on = true; } });
          (function loop(){ cx += (x-cx)*0.12; cy += (y-cy)*0.12; glow.style.transform = `translate(${cx}px,${cy}px)`; requestAnimationFrame(loop); })();
        }
      })();
    </script>
    <script src="./assets/js/resume.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  </body>
</html>
